<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title or "Dashboard" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="top-bar">
    <div class="logo">
        <img src="{{ url_for('static', filename='diaspora_logo.png') }}" alt="Logo">
    </div>
    <div class="title">
        <h1>My Azure Dashboard</h1>
        <p>Inventory & Operations</p>
    </div>
</header>

<main class="content">
    {% block content %}{% endblock %}
</main>

</body>
</html>
