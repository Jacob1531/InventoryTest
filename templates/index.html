<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Diaspora Inventory System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}">
    <link rel="shortcut icon" type="image/png" href="{{ url_for('static', filename='diaspora_logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>

  <body class="bg-light text-secondary">
    <main class="container min-vh-100 d-flex flex-column justify-content-center">
      <div class="text-center">

        <img class="mb-4 logo" src="{{ url_for('static', filename='diaspora_logo.png') }}"  alt="Diaspora Logo">

        <h1 class="fw-semibold text-dark mb-3">
          Diaspora Inventory System
        </h1>

        <p class="text-muted mb-4">
          Please enter your name to continue
        </p>

        <form method="post" action="{{ url_for('hello') }}">
          <div class="d-flex justify-content-center mb-3">
            <input type="text" class="form-control form-control-lg text-center" name="name" placeholder="Your name" style="max-width: 300px;">
          </div>

          <button type="submit" class="btn btn-outline-secondary btn-lg px-5">
            Say Hello
          </button>
        </form>

      </div>
    </main>
  </body>
</html>
