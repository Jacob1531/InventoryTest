<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Diaspora Inventory System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}">
    <link rel="shortcut icon" type="image/png" href="{{ url_for('static', filename='diaspora_logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>

  <body class="theme-light">
    <main class="container min-vh-100 d-flex flex-column justify-content-center">
      <div class="text-center">

        <img class="mb-4 logo" src="{{ url_for('static', filename='diaspora_logo.png') }}"  alt="Diaspora Logo" width="256" height="192">

        <h1 class="fw-semibold mb-3 brand-title">
          Diaspora Inventory System
        </h1>
        
        <button id="theme-toggle" class="btn btn-sm btn-outline-secondary position-absolute top-0 end-0 m-3" aria-label="Toggle dark mode">
          🌙
        </button>

        <p class="text-muted mb-4">
          Please enter your name to continue
        </p>

        <form method="post" action="{{ url_for('hello') }}">
          <div class="d-flex justify-content-center mb-3">
            <input type="text" class="form-control form-control-lg text-center" name="name" placeholder="Your name" style="max-width: 300px;">
          </div>

          <button type="submit" class="btn btn-outline-secondary btn-lg px-5">
            Say Hello
          </button>
        </form>

      </div>
    </main>
    <script>
    const toggle = document.getElementById("theme-toggle");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

    // Load saved theme or system preference
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme) {
      document.body.className = savedTheme;
    } else if (prefersDark) {
      document.body.className = "theme-dark";
    }

    toggle.addEventListener("click", () => {
      const isDark = document.body.classList.toggle("theme-dark");
      document.body.classList.toggle("theme-light", !isDark);
      localStorage.setItem("theme", document.body.className);
      toggle.textContent = isDark ? "☀️" : "🌙";
    });
  </script>
  </body>
</html>
